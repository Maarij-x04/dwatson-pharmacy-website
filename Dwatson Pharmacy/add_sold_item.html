<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Record Sold Item</title>
</head>
<body>
    <h2>Record Sold Item for an Existing Sale</h2>
    <form action="add_sold_item.php" method="POST">
        <label for="sale_id">Sale ID (Existing):</label>
        <input type="number" name="sale_id" id="sale_id" required><br><br>

        <label for="medicine_id">Medicine:</label>
        <select name="medicine_id" id="medicine_id" required>
            <option value="1">2blink Eye Drop</option>
            <option value="2">2sum 1gm Injection</option>
            <option value="3">Ad Folic 300mcg Tablets</option>
            <option value="4">Acdermin Gel 20gm</option>
            <option value="5">Accutane 20mg Capsules</option>
            <option value="6">Ablixa 10mg Tablets</option>
        </select><br><br>

        <label for="quantity">Quantity:</label>
        <input type="number" name="quantity" id="quantity" required><br><br>

        <label for="unit_price">Unit Price:</label>
        <input type="number" step="0.01" name="unit_price" id="unit_price" required><br><br>

        <input type="submit" value="Add Sold Item">
    </form>
</body>
</html>
